  <title>Signal path from mixture audio to separated vocal waveform</title>
  <text x="56" y="66" class="title">Audio separation signal path</text>
  <text x="56" y="98" class="subtitle">The implementation predicts a vocal mask on normalized STFT magnitudes, then reconstructs audio with the mixture phase.</text>

