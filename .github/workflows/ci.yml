name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TORCH_USE_ONEDNN: "0"
      DNNL_MAX_CPU_ISA: "AVX2"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: pre-commit run --all-files

      - name: Test
        run: pytest -v
